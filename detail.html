<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết phim</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>🎬 Film Rate</h1>
        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="about.html">Giới thiệu</a>
            <a href="detail.html">Phim</a>
        </nav>
    </header>

    <main>
        
        <!-- MOVIE DETAIL -->
        <section class="movie-detail">

            <img src="images/movie1.jpg" alt="Movie">

            <div class="info">
                <h2>Avengers</h2>
                <p>⭐ 8.5</p>
                <p><strong>Thể loại:</strong> Hành động</p>
                <p><strong>Mô tả:</strong> Phim siêu anh hùng của Marvel...</p>
            </div>

        </section>

        <!-- REVIEW -->
        <section class="review">
            <h2>Đánh giá</h2>

            <form id="reviewForm">
                <p><input type="text" id="name" placeholder="Tên của bạn"></p>
                <p><input type="number" id="rating" placeholder="Điểm (1-10)"></p>
                <p><textarea id="comment" placeholder="Nhận xét"></textarea></p>
                <p><button type="submit">Gửi</button></p>
            </form>

            <div id="reviewList"></div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© Thiết kế Web(02) nhóm 8 - NEU - Kì xuân 2026</p>
    </footer>

    <script src="js/main.js"></script>

</body>
</html>
